<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Expenses</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0D1117;
  --card: #161B22;
  --border: rgba(255,255,255,0.08);
  --green: #00C896;
  --blue: #4A9EFF;
  --orange: #FF6B35;
  --red: #FF4757;
  --muted: #8B949E;
  --white: #E6EDF3;
  --radius: 12px;
}
html, body { height: 100%; background: var(--bg); color: var(--white); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
.header { padding: 16px 20px 8px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header p { color: var(--muted); font-size: 13px; margin-top: 2px; }
.tab-content { flex: 1; overflow-y: auto; padding: 16px 20px 80px; display: none; }
.tab-content.active { display: block; }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--card); border-top: 1px solid var(--border); display: flex; }
.nav-btn { flex: 1; padding: 12px 8px; background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-btn .icon { font-size: 20px; }
.nav-btn.active { color: var(--green); }
.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--white); padding: 12px; font-size: 16px; font-family: inherit; appearance: none; -webkit-appearance: none; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--green); }
textarea { resize: none; height: 72px; font-size: 14px; }
.amount-prefix { position: relative; }
.amount-prefix::before { content: 'KES'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; font-weight: 600; pointer-events: none; }
.amount-prefix input { padding-left: 52px; font-size: 28px; font-weight: 700; text-align: right; padding-right: 16px; }
.toggle-group { display: flex; gap: 8px; }
.toggle-btn { flex: 1; padding: 12px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; }
.toggle-btn.active-personal { background: rgba(74,158,255,0.15); border-color: var(--blue); color: var(--blue); }
.toggle-btn.active-business { background: rgba(255,107,53,0.15); border-color: var(--orange); color: var(--orange); }
.toggle-btn.active-payment { background: rgba(0,200,150,0.15); border-color: var(--green); color: var(--green); }
.btn-primary { width: 100%; padding: 16px; background: var(--green); border: none; border-radius: 12px; color: #000; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.stat-row:last-child { border-bottom: none; }
.stat-label { font-size: 14px; color: var(--muted); }
.stat-value { font-size: 15px; font-weight: 600; }
.big-total { text-align: center; padding: 8px 0; }
.big-total .amount { font-size: 36px; font-weight: 800; color: var(--green); }
.big-total .label { font-size: 13px; color: var(--muted); margin-top: 4px; }
.budget-bar-wrap { margin-top: 8px; }
.budget-bar-bg { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
.budget-bar-fill { height: 100%; border-radius: 4px; background: var(--green); }
.budget-bar-fill.over { background: var(--red); }
.budget-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 4px; }
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.month-nav button { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--white); padding: 8px 14px; font-size: 18px; cursor: pointer; }
.month-nav .month-label { font-size: 17px; font-weight: 700; }
.expense-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.expense-item:last-child { border-bottom: none; }
.expense-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.expense-icon.personal { background: rgba(74,158,255,0.15); }
.expense-icon.business { background: rgba(255,107,53,0.15); }
.expense-body { flex: 1; min-width: 0; }
.expense-desc { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.expense-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.expense-amount { font-size: 15px; font-weight: 700; white-space: nowrap; }
.split-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin: 10px 0 4px; }
.split-bar-personal { background: var(--blue); }
.split-bar-business { background: var(--orange); }
.split-legend { display: flex; gap: 16px; font-size: 12px; }
.split-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
.section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <h1>💳 Expenses</h1>
  <p id="header-date"></p>
</div>

<div id="tab-add" class="tab-content active">
  <div class="form-group">
    <label>Amount</label>
    <div class="amount-prefix">
      <input type="number" id="f-amount" placeholder="0" min="0" step="1"/>
    </div>
  </div>
  <div class="form-group">
    <label>Description</label>
    <input type="text" id="f-desc" placeholder="What was it for?" />
  </div>
  <div class="form-group">
    <label>Category</label>
    <select id="f-category">
      <option value="Groceries">🛒 Groceries</option>
      <option value="Food Delivery">🛵 Food Delivery</option>
      <option value="Rent">🏠 Rent</option>
      <option value="Electricity">⚡ Electricity</option>
      <option value="Water">💧 Water</option>
      <option value="Internet">📶 Internet</option>
      <option value="House Help">🏡 House Help</option>
      <option value="Fuel">⛽ Fuel</option>
      <option value="Entertainment">🎉 Entertainment</option>
      <option value="Salaries">💼 Salaries</option>
      <option value="Other">📦 Other</option>
    </select>
  </div>
  <div class="form-group">
    <label>Type</label>
    <div class="toggle-group" id="type-group">
      <button class="toggle-btn active-personal" data-val="Personal" onclick="selectType('Personal')">Personal</button>
      <button class="toggle-btn" data-val="Business" onclick="selectType('Business')">Business</button>
    </div>
  </div>
  <div class="form-group">
    <label>Payment Method</label>
    <div class="toggle-group" id="payment-group">
      <button class="toggle-btn active-payment" data-val="Mpesa" onclick="selectPayment('Mpesa')">Mpesa</button>
      <button class="toggle-btn" data-val="Card" onclick="selectPayment('Card')">Card</button>
      <button class="toggle-btn" data-val="Cash" onclick="selectPayment('Cash')">Cash</button>
    </div>
  </div>
  <div class="form-group">
    <label>Date</label>
    <input type="date" id="f-date" />
  </div>
  <div class="form-group">
    <label>Notes (optional)</label>
    <textarea id="f-notes" placeholder="Any extra details..."></textarea>
  </div>
  <button class="btn-primary" id="submit-btn" onclick="submitExpense()">Log Expense</button>
</div>

<div id="tab-month" class="tab-content">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <span class="month-label" id="month-label"></span>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div id="month-content"><div class="empty">Loading...</div></div>
</div>

<div id="tab-recent" class="tab-content">
  <div id="recent-content"><div class="empty">Loading...</div></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-add" onclick="switchTab('add')">
    <span class="icon">➕</span>Add
  </button>
  <button class="nav-btn" id="nav-month" onclick="switchTab('month')">
    <span class="icon">📊</span>Month
  </button>
  <button class="nav-btn" id="nav-recent" onclick="switchTab('recent')">
    <span class="icon">🕐</span>Recent
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://uwcpfiildiweurmofmdw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3Y3BmaWlsZGl3ZXVybW9mbWR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjEyNjAsImV4cCI6MjA5MTI5NzI2MH0.6L5s2F_myCTojAqc8Y6CxPm0IXyMI4OP8Y3AlTPyUOY';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

var selectedType = 'Personal';
var selectedPayment = 'Mpesa';
var currentMonth, currentYear;
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var CAT_ICONS = {'Groceries':'🛒','Food Delivery':'🛵','Rent':'🏠','Electricity':'⚡','Water':'💧','Internet':'📶','House Help':'🏡','Fuel':'⛽','Entertainment':'🎉','Salaries':'💼','Other':'📦'};

function init() {
  var now = new Date();
  currentMonth = now.getMonth() + 1;
  currentYear = now.getFullYear();
  document.getElementById('f-date').value = now.toISOString().split('T')[0];
  document.getElementById('header-date').textContent = MONTHS[now.getMonth()] + ' ' + now.getFullYear();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');
  if (tab === 'month') loadMonthSummary();
  if (tab === 'recent') loadRecent();
}

function selectType(val) {
  selectedType = val;
  document.querySelectorAll('#type-group .toggle-btn').forEach(btn => {
    btn.classList.remove('active-personal','active-business');
    if (btn.dataset.val === val) btn.classList.add(val === 'Personal' ? 'active-personal' : 'active-business');
  });
}

function selectPayment(val) {
  selectedPayment = val;
  document.querySelectorAll('#payment-group .toggle-btn').forEach(btn => {
    btn.classList.remove('active-payment');
    if (btn.dataset.val === val) btn.classList.add('active-payment');
  });
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function submitExpense() {
  var amount = document.getElementById('f-amount').value;
  var desc = document.getElementById('f-desc').value.trim();
  var category = document.getElementById('f-category').value;
  var date = document.getElementById('f-date').value;
  var notes = document.getElementById('f-notes').value.trim();
  if (!amount || parseFloat(amount) <= 0) { showToast('Enter an amount'); return; }
  if (!desc) { showToast('Add a description'); return; }
  var btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const { error } = await db.from('expenses').insert({
    date, amount: parseFloat(amount), description: desc,
    category, type: selectedType, payment: selectedPayment, notes
  });
  btn.disabled = false; btn.textContent = 'Log Expense';
  if (error) { showToast('Error: ' + error.message); return; }
  showToast('✓ Expense logged');
  document.getElementById('f-amount').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-notes').value = '';
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  loadMonthSummary();
}

function fmtKES(n) { return 'KES ' + Math.round(n).toLocaleString(); }

async function loadMonthSummary() {
  document.getElementById('month-label').textContent = MONTHS[currentMonth-1] + ' ' + currentYear;
  document.getElementById('month-content').innerHTML = '<div class="empty">Loading...</div>';
  var start = currentYear + '-' + String(currentMonth).padStart(2,'0') + '-01';
  var end = new Date(currentYear, currentMonth, 0);
  var endStr = currentYear + '-' + String(currentMonth).padStart(2,'0') + '-' + String(end.getDate()).padStart(2,'0');
  const { data, error } = await db.from('expenses').select('*').gte('date', start).lte('date', endStr);
  const { data: budgetData } = await db.from('budgets').select('*');
  if (error) { document.getElementById('month-content').innerHTML = '<div class="empty">Could not load data</div>'; return; }
  var budgets = {};
  if (budgetData) budgetData.forEach(b => budgets[b.category] = b.amount);
  renderMonthSummary(data || [], budgets);
}

function renderMonthSummary(expenses, budgets) {
  var total = 0, categories = {}, byType = {Personal:0,Business:0}, byPayment = {Mpesa:0,Card:0,Cash:0};
  expenses.forEach(e => {
    total += parseFloat(e.amount);
    categories[e.category] = (categories[e.category]||0) + parseFloat(e.amount);
    byType[e.type] = (byType[e.type]||0) + parseFloat(e.amount);
    byPayment[e.payment] = (byPayment[e.payment]||0) + parseFloat(e.amount);
  });
  var html = '<div class="card"><div class="big-total"><div class="amount">' + fmtKES(total) + '</div><div class="label">Total spent</div></div></div>';
  if (total > 0) {
    var pPct = Math.round((byType.Personal/total)*100);
    html += '<div class="card"><div class="section-title">Personal vs Business</div>';
    html += '<div class="split-bar"><div class="split-bar-personal" style="width:'+pPct+'%"></div><div class="split-bar-business" style="width:'+(100-pPct)+'%"></div></div>';
    html += '<div class="split-legend"><span><span class="split-dot" style="background:#4A9EFF"></span>'+fmtKES(byType.Personal)+' personal</span><span><span class="split-dot" style="background:#FF6B35"></span>'+fmtKES(byType.Business)+' business</span></div></div>';
  }
  html += '<div class="card"><div class="section-title">Payment Methods</div>';
  ['Mpesa','Card','Cash'].forEach(m => { if(byPayment[m]>0) html += '<div class="stat-row"><span class="stat-label">'+m+'</span><span class="stat-value">'+fmtKES(byPayment[m])+'</span></div>'; });
  html += '</div>';
  var sortedCats = Object.keys(categories).sort((a,b) => categories[b]-categories[a]);
  if (sortedCats.length > 0) {
    html += '<div class="section-title">By Category</div>';
    sortedCats.forEach(cat => {
      var amt = categories[cat], budget = budgets[cat], icon = CAT_ICONS[cat]||'📦';
      html += '<div class="card"><div class="stat-row"><span class="stat-label">'+icon+' '+cat+'</span><span class="stat-value">'+fmtKES(amt)+'</span></div>';
      if (budget) {
        var pct = Math.min(100,Math.round((amt/budget)*100)), over = amt>budget;
        html += '<div class="budget-bar-wrap"><div class="budget-bar-bg"><div class="budget-bar-fill'+(over?' over':'')+'" style="width:'+pct+'%"></div></div><div class="budget-meta"><span>'+pct+'% of budget</span><span>'+fmtKES(budget)+'</span></div></div>';
      }
      html += '</div>';
    });
  } else { html += '<div class="empty">No expenses this month</div>'; }
  document.getElementById('month-content').innerHTML = html;
}

async function loadRecent() {
  document.getElementById('recent-content').innerHTML = '<div class="empty">Loading...</div>';
  const { data, error } = await db.from('expenses').select('*').order('date', {ascending:false}).order('created_at', {ascending:false}).limit(20);
  if (error) { document.getElementById('recent-content').innerHTML = '<div class="empty">Could not load</div>'; return; }
  if (!data || data.length === 0) { document.getElementById('recent-content').innerHTML = '<div class="empty">No expenses yet</div>'; return; }
  var html = '<div class="card">';
  data.forEach(e => {
    var icon = CAT_ICONS[e.category]||'📦', typeClass = e.type==='Business'?'business':'personal';
    var dateStr = new Date(e.date).toLocaleDateString('en-KE',{day:'numeric',month:'short'});
    html += '<div class="expense-item"><div class="expense-icon '+typeClass+'">'+icon+'</div><div class="expense-body"><div class="expense-desc">'+e.description+'</div><div class="expense-meta">'+e.category+' · '+dateStr+' · '+e.payment+'</div></div><div class="expense-amount">'+fmtKES(e.amount)+'</div></div>';
  });
  html += '</div>';
  document.getElementById('recent-content').innerHTML = html;
}

init();
</script>
</body>
</html>
